<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiptuneSynth — CodePen Showcase</title>
    <meta name="description" content="Browse 30+ live CodePen demos built with ChiptuneSynth — sequencers, instruments, ambient generators, games and experimental sound art.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --cs-cyan:   #00f0ff;
            --cs-violet: #a855f7;
            --cs-bg:     #0a0a0f;
        }
        body { background: var(--cs-bg); font-size: 14px; }

        /* ── Hero ───────────────────────────────────── */
        .cs-hero {
            padding: 72px 0 48px;
            text-align: center;
        }
        .cs-hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--cs-cyan) 0%, var(--cs-violet) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .cs-hero p {
            color: #aaa;
            font-size: 1.05rem;
            max-width: 560px;
            margin: 0 auto 24px;
        }
        .cs-hero .cs-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,240,255,0.08);
            border: 1px solid rgba(0,240,255,0.25);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--cs-cyan);
            font-weight: 600;
        }

        /* ── Grid ───────────────────────────────────── */
        .cs-embed-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            padding-bottom: 80px;
        }
        @media (max-width: 768px) {
            .cs-embed-grid { grid-template-columns: 1fr; }
        }

        /* ── Embed style ────────────────────────────── */
        .cs-embed-grid .codepen {
            margin: 0 !important;
            border-radius: 10px !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            overflow: hidden;
        }
    </style>
</head>
<body>

<!-- nav injected by index.php -->

<main class="container" style="max-width:1100px; padding-top:60px;">

    <!-- ── Hero ──────────────────────────────────────────── -->
    <div class="cs-hero">
        <h1>CodePen Showcase</h1>
        <p>Live demos built with ChiptuneSynth — from sequencers to experimental sound art. Every pen runs directly in your browser.</p>
        <span class="cs-badge">
            <i class="bi bi-collection-play"></i>
            Built with ChiptuneSynth v3
        </span>
    </div>

    <!-- ── Grid ──────────────────────────────────────────── -->
    <div id="cs-grid" class="cs-embed-grid"></div>

</main>

<script>
/* ═══════════════════════════════════════════════════════
   ✏️  AJOUTE / RETIRE des IDs ici — un par ligne
   Pour récupérer tous tes IDs d'un coup, ouvre :
   http://localhost/8b/com.8binami.github.chiptune-synth/.server/fetch_pens.php
═══════════════════════════════════════════════════════ */
const PENS = [
    'XJjygbJ',
    'gbwBxVL',
    'NPRwPOd',
    'qEaXYjw',
    'xbELjgm',
    'YPGxamM',
    'pvEemJo',
    'pvEeBXM',
    'qEarwzr',
    'RNGpOmQ',
    'xbEqeNR',
    'VYKpNNM',
    'ByLWEvO',
    'MYjpRzN',
    'qEarwQq',
    'vEXxMVe'
];

/* ── Génération des embeds ────────────────────────────── */
(function () {
    var grid = document.getElementById('cs-grid');
    PENS.forEach(function (id) {
        var p = document.createElement('p');
        p.className = 'codepen';
        p.setAttribute('data-height',      '300');
        p.setAttribute('data-default-tab', 'result');
        p.setAttribute('data-slug-hash',   id);
        p.setAttribute('data-user',        '8binami');
        p.setAttribute('data-zoom',        '0.5');
        p.style.cssText = 'height:300px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;margin:0;padding:1em;';
        p.innerHTML = '<span>See the Pen <a href="https://codepen.io/8binami/pen/' + id + '">' + id + '</a>'
                    + ' by <a href="https://codepen.io/8binami">@8binami</a>'
                    + ' on <a href="https://codepen.io">CodePen</a>.</span>';
        grid.appendChild(p);
    });
})();
</script>

<!-- CodePen embed — chargé après que les éléments sont dans le DOM -->
<script async src="https://public.codepenassets.com/embed/index.js"></script>

</body>
</html>
