<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.183.0/build/three.webgpu.js",
    "three/webgpu":  "https://unpkg.com/three@0.183.0/build/three.webgpu.js",
    "three/tsl":     "https://unpkg.com/three@0.183.0/build/three.tsl.js",

<script type="module">
import * as THREE from "three/webgpu";
import {
  Fn, uniform, storage, instanceIndex,
  vec3, vec4, cos, sin, min, max, select,
  float, floor, positionLocal,
  pass, output, Loop, exp, pow, sqrt
} from "three/tsl";
import { bloom } from "three/addons/tsl/display/BloomNode.js";

/* ── WebGPU guard ─────────────────────────────────────────────── */
if(!navigator.gpu){
  document.body.innerHTML=`<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#010805;color:#a0ffd4;font-family:sans-serif;text-align:center"><div><h2>WebGPU required</h2><p style="opacity:.5;margin-top:.5em">Chrome 113+ / Edge 113+</p></div></div>`;
  throw new Error("WebGPU unavailable");
}

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS — tentacules bioluminescents
   ═══════════════════════════════════════════════════════════════ */
const ROWS       = 3;
const PER_ROW    = 14;
const N          = ROWS * PER_ROW;          // 42 tentacules — forêt abyssale
const STRING_LEN = 26;

const ROW_CFG = [
  { y:0, xSpan:30.0, zOff:-22.0, thickBase:0.026, thickEnd:0.008, label:'deep'    },
  { y:0, xSpan:24.0, zOff:-16.0, thickBase:0.018, thickEnd:0.006, label:'mid'     },
  { y:0, xSpan:18.0, zOff:-10.0, thickBase:0.012, thickEnd:0.004, label:'close'   }
];

/* Couleur des tentacules — bleu abyssal → cyan électrique → blanc-bleu lumière */
function stringColor(i){
  const t = i / (N-1);
  if(t < 0.40){
    const s = t / 0.40;
    return [0.01 + s*0.04, 0.25 + s*0.40, 0.50 + s*0.35]; // bleu profond → cyan
  } else if(t < 0.75){
    const s = (t - 0.40) / 0.35;
    return [0.05 + s*0.08, 0.65 + s*0.15, 0.85 + s*0.10]; // cyan → teal lumineux
  } else {
    const s = (t - 0.75) / 0.25;
    return [0.13 + s*0.22, 0.80 + s*0.18, 0.95 - s*0.10]; // teal → blanc-bleu
  }
}

const PEN = ['A','C','D','E','G'];
function pitchForIndex(i){
  const idx = i % (PEN.length*2);
  const oct = 2 + Math.floor(idx/PEN.length);
  return [PEN[idx % PEN.length], oct];
}

/* ═══════════════════════════════════════════════════════════════
   SCENE — abysse sous-marin
   ═══════════════════════════════════════════════════════════════ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x041828);
scene.fog = new THREE.FogExp2(0x041828, 0.025);

/* Caméra dans l'eau — vue horizontale immersive, milieu de la colonne d'eau */
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.05, 300);
camera.position.set(0, 3, 10);
camera.lookAt(0, 1.5, -10);

const renderer = new THREE.WebGPURenderer({canvas:document.querySelector('#c'), antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.setAnimationLoop(animate);

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* Caméra immergée — milieu de la colonne d'eau */
const CAM_BASE      = new THREE.Vector3(0, 3, 10);
const CAM_LOOK_BASE = new THREE.Vector3(0, 1.5, -10);
const _camCurrent   = new THREE.Vector3().copy(CAM_BASE);
const _lookCurrent  = new THREE.Vector3().copy(CAM_LOOK_BASE);
const _camTarget    = new THREE.Vector3().copy(CAM_BASE);
const _lookTarget   = new THREE.Vector3().copy(CAM_LOOK_BASE);
const _homePos      = new THREE.Vector3().copy(CAM_BASE);
const _homeLook     = new THREE.Vector3().copy(CAM_LOOK_BASE);
camera.position.copy(CAM_BASE);
camera.lookAt(CAM_LOOK_BASE);

let _exciteX = 0;
let _exciteXSmooth = 0;

/* Flottement — courant sous-marin lent */
const DRIFT_CFG = {
  driftMaxZ:   4.0,
  driftSpeed:  0.15,
  returnSpeed: 0.8,
  idleDelay:   2200,
};

/* Flottement aquatique — ample et lent, comme porté par un courant profond */
const FLOAT_CFG = {
  posAmpX:  0.80,
  posAmpY:  0.55,
  posAmpZ:  0.60,
  rollAmp:  0.005,
  pitchAmp: 0.003,
};

const phi = 1.6180339887, pi = Math.PI;
const _floatOsc = {
  px: [ {f:0.00022*phi,   p:Math.random()*pi*2},
        {f:0.00014*pi,   p:Math.random()*pi*2},
        {f:0.00008*phi*pi, p:Math.random()*pi*2} ],
  py: [ {f:0.00018*phi,   p:Math.random()*pi*2},
        {f:0.00012*pi,   p:Math.random()*pi*2},
        {f:0.00006*phi*pi, p:Math.random()*pi*2} ],
  pz: [ {f:0.00020*phi,   p:Math.random()*pi*2},
        {f:0.00010*pi,   p:Math.random()*pi*2},
        {f:0.00005*phi*pi, p:Math.random()*pi*2} ],
  rx: [ {f:0.00014*phi,   p:Math.random()*pi*2},
        {f:0.00008*pi,   p:Math.random()*pi*2},
        {f:0.00005*phi*pi, p:Math.random()*pi*2} ],
  rz: [ {f:0.00012*phi,   p:Math.random()*pi*2},
        {f:0.00006*pi,   p:Math.random()*pi*2},
        {f:0.00003*phi*pi, p:Math.random()*pi*2} ],
};
function floatVal(oscs, t){ return oscs.reduce((s,o)=>s+Math.sin(t*o.f+o.p), 0)/oscs.length; }

let   _recenter   = 0;
const RECENTER_DECAY = 0.0003;
let _driftZ      = 0;
let _lastChordMs = -Infinity;

/* ═══════════════════════════════════════════════════════════════
   VOL ORBITAL — orbite douce autour des tentacules
   ═══════════════════════════════════════════════════════════════ */
const FLIGHT_LERP = 0.018;  // glissement doux sous-marin
const FLIGHT_ARRIVE_DIST = 0.5;
let _flightActive = false;
let _flightDest   = new THREE.Vector3();
const _flightLookCenter = new THREE.Vector3();

/* Orbite serrée — plongeur qui nage entre les tentacules */
const VORTEX_CENTER = new THREE.Vector3(0, 2, -10);
const ORBIT_RADIUS  = 9;    // reste à l'intérieur de la forêt
const ORBIT_MIN_Y   = 0.5;  // jamais sous le fond
const ORBIT_MAX_Y   = 5.5;  // jamais hors de l'eau
let _orbitAngle = 0;

function pickDestination(chordIdx, cx){
  /* Avance l'angle — 360° en ~5-7 accords */
  const step = (0.75 + (chordIdx % 5) * 0.10);
  _orbitAngle += step;

  const x = VORTEX_CENTER.x + Math.sin(_orbitAngle) * ORBIT_RADIUS;
  const z = VORTEX_CENTER.z + Math.cos(_orbitAngle) * ORBIT_RADIUS;
  /* Hauteur sinusoïdale — plonge et remonte comme un plongeur */
  const yMid = (ORBIT_MIN_Y + ORBIT_MAX_Y) * 0.5;
  const yAmp = (ORBIT_MAX_Y - ORBIT_MIN_Y) * 0.5;
  const y = yMid + Math.sin(_orbitAngle * 0.6) * yAmp;

  /* Regard toujours vers le centre du vortex */
  _flightLookCenter.copy(VORTEX_CENTER);
  return new THREE.Vector3(x, y, z);
}

function startFlight(chordIdx, cx){
  _flightDest.copy(pickDestination(chordIdx, cx));
  _flightActive = true;
}

/* ═══════════════════════════════════════════════════════════════
   UNIFORMS
   ═══════════════════════════════════════════════════════════════ */
const dtU    = uniform(0);
const mxU    = uniform(0);
const myU    = uniform(0);
const mzU    = uniform(0);
const mAmpU  = uniform(0);
const wxU    = uniform(-999);
const wAmpU  = uniform(0);
const cxU    = uniform(-999);
const cAmpU  = uniform(0);

/* ═══════════════════════════════════════════════════════════════
   TENTACLE DATA
   ═══════════════════════════════════════════════════════════════ */
let ampBuf, phaseBuf, harmBuf, dataBuf;
let ampSt, phaseSt, harmSt, dataSt;
let computeNode = null, stMesh = null;

/* Géométrie verticale — le tube pointe vers le haut (Y) */
const GEO = new THREE.BoxGeometry(1, STRING_LEN, 1, 1, 48, 1);

function initBuffers(){
  ampBuf   = new THREE.StorageBufferAttribute(N, 1);
  phaseBuf = new THREE.StorageBufferAttribute(N, 1);
  harmBuf  = new THREE.StorageBufferAttribute(N, 1);
  dataBuf  = new THREE.StorageBufferAttribute(N, 4);

  for(let i=0; i<N; i++){
    const row = Math.floor(i/PER_ROW);
    const col = i % PER_ROW;
    const tC  = col/(PER_ROW-1);
    const cfg = ROW_CFG[row];
    const [r,g,b] = stringColor(i);
    const thick = cfg.thickBase + (cfg.thickEnd - cfg.thickBase)*tC;

    ampBuf.array[i]   = 0;
    phaseBuf.array[i] = Math.random()*Math.PI*2;
    harmBuf.array[i]  = 1 + Math.floor(Math.random()*4);

    /* Lueur résiduelle au repos — bioluminescence quand excité */
    dataBuf.array[i*4+0] = r * 0.40;
    dataBuf.array[i*4+1] = g * 0.40;
    dataBuf.array[i*4+2] = b * 0.40;
    dataBuf.array[i*4+3] = thick;
  }

  ampSt   = storage(ampBuf,   'float', N);
  phaseSt = storage(phaseBuf, 'float', N);
  harmSt  = storage(harmBuf,  'float', N);
  dataSt  = storage(dataBuf,  'vec4',  N);
}

/* ═══════════════════════════════════════════════════════════════
   COMPUTE — physique tentacules GPU
   ═══════════════════════════════════════════════════════════════ */

const WAVE_CONFIG = {
  omegaBase:   2.0,       // plus lent — ondulation aquatique
  omegaHarm:   1.8,
  omegaPos:    1.2,
  decay:       0.45,      // decay plus lent — résonance aquatique
  mouseRadius: 0.7,
  mouseForce:  7.0,
  chordRadius: 0.12,
  chordForce:  22.0,      // plus fort — tentacules massifs
  windRadius:  0.5,
  windForce:   4.5,       // courant sous-marin
  diffusion:   7.0,       // plus de diffusion — propagation dans l'eau
  ampMax:      2.0,
  waveAmp:     0.35,      // amplitude plus grande — mouvement souple
  taper:       0.45,      // effilage plus prononcé
  /* Glow bioluminescent — cyan électrique HDR */
  glowR: 0.05, glowG: 1.0, glowB: 2.2,
  glowForce:   5.0,
  camExciteH:   0.6,
  lookExciteH:  1.2,
  camLerp:      0.006,
  mouseEnabled: false,
};

function buildCompute(){
  return Fn(()=>{
    const idx   = instanceIndex;
    const idxF  = float(idx);
    const rowF  = floor(idxF.div(float(PER_ROW)));
    const colF  = idxF.mod(float(PER_ROW));

    const tC = colF.div(float(PER_ROW-1));

    let yW = float(ROW_CFG[0].y);
    for(let r=1; r<ROWS; r++){
      yW = yW.add(select(rowF.greaterThanEqual(float(r)), float(ROW_CFG[r].y - ROW_CFG[r-1].y), float(0)));
    }

    let zCenterW = float(ROW_CFG[0].zOff);
    for(let r=1; r<ROWS; r++){
      zCenterW = zCenterW.add(select(rowF.greaterThanEqual(float(r)), float(ROW_CFG[r].zOff - ROW_CFG[r-1].zOff), float(0)));
    }

    let xSpanW = float(ROW_CFG[0].xSpan);
    for(let r=1; r<ROWS; r++){
      xSpanW = xSpanW.add(select(rowF.greaterThanEqual(float(r)), float(ROW_CFG[r].xSpan - ROW_CFG[r-1].xSpan), float(0)));
    }

    const xW = tC.mul(xSpanW).sub(xSpanW.mul(0.5));

    const harm  = harmSt.element(idx);
    const omega = float(WAVE_CONFIG.omegaBase).add(harm.mul(WAVE_CONFIG.omegaHarm)).add(tC.mul(WAVE_CONFIG.omegaPos));

    const ph = phaseSt.element(idx).toVar();
    ph.addAssign(omega.mul(dtU));
    phaseSt.element(idx).assign(ph);

    const amp = ampSt.element(idx).toVar();
    amp.mulAssign(pow(float(WAVE_CONFIG.decay), dtU));

    const mdx = xW.sub(mxU), mdy = yW.sub(myU);
    const md2 = mdx.mul(mdx).add(mdy.mul(mdy));
    amp.addAssign(mAmpU.mul(exp(md2.negate().mul(float(WAVE_CONFIG.mouseRadius)))).mul(dtU).mul(float(WAVE_CONFIG.mouseForce)));

    const cdx = xW.sub(cxU);
    amp.addAssign(cAmpU.mul(exp(cdx.mul(cdx).negate().mul(float(WAVE_CONFIG.chordRadius)))).mul(dtU).mul(float(WAVE_CONFIG.chordForce)));

    const wdx = xW.sub(wxU);
    amp.addAssign(wAmpU.mul(exp(wdx.mul(wdx).negate().mul(float(WAVE_CONFIG.windRadius)))).mul(dtU).mul(float(WAVE_CONFIG.windForce)));

    const N1   = float(N-1);
    const lIdx = max(idxF.sub(1), float(0));
    const rIdx = min(idxF.add(1), N1);
    const uIdx = max(idxF.sub(float(PER_ROW)), float(0));
    const dIdx = min(idxF.add(float(PER_ROW)), N1);
    const nbA  = ampSt.element(lIdx).add(ampSt.element(rIdx))
                      .add(ampSt.element(uIdx)).add(ampSt.element(dIdx))
                      .mul(float(0.25));
    amp.addAssign(nbA.sub(amp).mul(dtU).mul(float(WAVE_CONFIG.diffusion)));

    amp.assign(min(max(amp, float(0)), float(WAVE_CONFIG.ampMax)));
    ampSt.element(idx).assign(amp);
  })().compute(N);
}

/* ═══════════════════════════════════════════════════════════════
   MATERIAL — bioluminescence
   ═══════════════════════════════════════════════════════════════ */
function buildMaterial(){
  const mat = new THREE.MeshBasicMaterial();

  mat.positionNode = Fn(()=>{
    const idx   = instanceIndex;
    const data  = dataSt.element(idx);
    const amp   = ampSt.element(idx);
    const ph    = phaseSt.element(idx);
    const harm  = harmSt.element(idx);
    const pos   = positionLocal.toVar();
    const thick = data.w;

    /* Y est l'axe vertical — normalise le long du tentacule */
    const yNorm   = pos.y.add(float(STRING_LEN*0.5)).div(float(STRING_LEN));
    /* Double sinusoïde — ondulation organique de tentacule */
    const spatial = sin(yNorm.mul(float(Math.PI)).mul(harm))
                   .add(sin(yNorm.mul(float(Math.PI * 2.5))).mul(0.3));
    const wave    = spatial.mul(cos(ph)).mul(amp).mul(float(WAVE_CONFIG.waveAmp));
    const taper   = float(1).sub(yNorm.mul(float(WAVE_CONFIG.taper)));

    /* Ondulation sur X et Z — mouvement de nage 3D */
    pos.x.assign(pos.x.mul(thick).mul(taper).add(wave));
    pos.z.assign(pos.z.mul(thick).mul(taper).add(wave.mul(0.5).mul(sin(ph.mul(0.7)))));

    return pos;
  })();

  mat.colorNode = Fn(()=>{
    const idx  = instanceIndex;
    const amp  = ampSt.element(idx);
    const base = dataSt.element(idx).rgb;
    /* Glow bioluminescent — vert-cyan HDR */
    const glow = vec3(
      float(WAVE_CONFIG.glowR),
      float(WAVE_CONFIG.glowG),
      float(WAVE_CONFIG.glowB)
    ).mul(amp.mul(float(WAVE_CONFIG.glowForce)));
    return vec4(base.add(glow), float(1));
  })();

  return mat;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD / REBUILD
   ═══════════════════════════════════════════════════════════════ */
const _mat4 = new THREE.Matrix4();
const _qId  = new THREE.Quaternion();

function rebuild(){
  initBuffers();
  computeNode = buildCompute();

  if(stMesh){ scene.remove(stMesh); stMesh.material.dispose(); }
  stMesh = new THREE.InstancedMesh(GEO, buildMaterial(), N);
  stMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  scene.add(stMesh);

  /* Forêt de tentacules — grille aléatoire, anémones depuis le fond */
  /* Seed fixe pour positions stables */
  const rng = (n) => { let x=Math.sin(n*127.1+311.7)*43758.5453; return x-Math.floor(x); };
  for(let i=0; i<N; i++){
    const row = Math.floor(i/PER_ROW);
    const col = i % PER_ROW;
    const cfg = ROW_CFG[row];
    const tC  = col / (PER_ROW - 1);
    /* Position X étalée sur toute la largeur de la rangée + décalage aléatoire */
    const x = (tC - 0.5) * cfg.xSpan + (rng(i*2)   - 0.5) * 3.5;
    /* Z : chaque rangée à une profondeur différente + variation */
    const z = cfg.zOff               + (rng(i*2+1) - 0.5) * 5.0;
    /* Tous partent du fond (y = -2) — ils poussent vers le haut */
    const y = -2;
    _mat4.compose(new THREE.Vector3(x, y, z), _qId, new THREE.Vector3(1,1,1));
    stMesh.setMatrixAt(i, _mat4);
  }
  stMesh.instanceMatrix.needsUpdate = true;
}

rebuild();

const _starLayers = [];

(function buildParticles(){
  PARTICLE_LAYERS.forEach(cfg => {
    const n = cfg.count;
    const pos = new Float32Array(n * 3);
    const col = new Float32Array(n * 3);

    for(let i = 0; i < n; i++){
      /* Répartition en boîte devant la caméra — X,Y étalés, Z en profondeur */
      pos[i*3]   = (Math.random() - 0.5) * cfg.spread * 2;
      pos[i*3+1] = (Math.random() - 0.5) * cfg.spread * 1.5;
      pos[i*3+2] = -(cfg.depthMin + Math.random() * (cfg.depthMax - cfg.depthMin));

      const lum = 0.35 + Math.random() * 0.65;
      const vr = (Math.random() - 0.5) * cfg.colorVar;
      const vg = (Math.random() - 0.5) * cfg.colorVar;
      const vb = (Math.random() - 0.5) * cfg.colorVar;
      col[i*3]   = Math.min(1, Math.max(0, (cfg.color[0] + vr) * lum));
      col[i*3+1] = Math.min(1, Math.max(0, (cfg.color[1] + vg) * lum));
      col[i*3+2] = Math.min(1, Math.max(0, (cfg.color[2] + vb) * lum));
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));
    const mat = new THREE.PointsMaterial({
      size: cfg.size, vertexColors: true,
      sizeAttenuation: true, transparent: true, opacity: cfg.opacity,
      depthWrite: false, fog: false
    });
    const pts = new THREE.Points(geo, mat);
    /* Attaché à la caméra — suit toujours le joueur */
    camera.add(pts);
    /* depthFactor : les proches bougent beaucoup, les lointaines peu */
    const avgDepth = (cfg.depthMin + cfg.depthMax) * 0.5;
    _starLayers.push({ pts, avgDepth, geo, cfgIdx: _starLayers.length });
  });
  scene.add(camera);
})();

  { name:'Ebm7',  key:'D', notes:[['E',2],['G',2],['B',2],['D',3]], pan:-.12 },
  { name:'Fm9',   key:'F', notes:[['F',2],['A',2],['E',3],['G',3]], pan:  .12},
  { name:'Gb6',   key:'G', notes:[['G',2],['B',2],['D',3],['E',3]], pan: .30 },
  { name:'Absus', key:'H', notes:[['A',2],['D',3],['E',3],['A',3]], pan: .50 },
];

const SCALE = [
  ['C',3],['E',3],['G',3],['B',3],['D',4],
  ['C',4],['E',4],['G',4],['B',4],['D',5]
];
const CHORDS = CHORD_CONFIG.map(c => ({ notes: c.notes, pan: c.pan }));

async function initAudio(){
  if(audioReady || audioInitPending) return;
  audioInitPending = true;
  await synth.init();
  synth.setMasterVolume(0.28);

  /* TK_PIANO — son aquatique très filtré, réverbe massive */
  synth.loadInstrument('piano', TK_PIANO);
  synth.updateTrack(TK_PIANO,{
    unisonVoices:2, unisonDetune:6, unisonSpread:35,

  });
  synth.updateEnvelope(TK_PIANO,{attack:.040, decay:.90, sustain:.28, release:5.0});
  synth.updateVibrato(TK_PIANO,{rate:2.5, depth:4});
  synth.loadFxPreset(TK_PIANO,'space');
  synth.setReverbMix(TK_PIANO,.96); synth.setReverbDecay(TK_PIANO,.98);
  synth.setChorusRate(TK_PIANO,.15); synth.setChorusDepth(TK_PIANO,.20); synth.setChorusMix(TK_PIANO,.18);
  synth.setDelayTime(TK_PIANO,.85); synth.setDelayFeedback(TK_PIANO,.32); synth.setDelayMix(TK_PIANO,.20);
  synth.setTrackFaderVolume(TK_PIANO,.40); synth.setTrackPan(TK_PIANO,.05);

  /* TK_BASS — basse abyssale profonde */
  synth.loadInstrument('contrabass', TK_BASS);
  synth.updateTrack(TK_BASS,{
    bowNoise:false, bowNoiseLevel:0,
    unisonVoices:1, unisonDetune:5, unisonSpread:22,
    filterEnabled:true, filterType:'lowpass', filterCutoff:280, filterQ:0.55
  });
  synth.updateEnvelope(TK_BASS,{attack:.30, decay:.95, sustain:.70, release:6.0});
  synth.updateVibrato(TK_BASS,{rate:1.8, depth:4});
  synth.loadFxPreset(TK_BASS,'space');
  synth.setReverbMix(TK_BASS,.94); synth.setReverbDecay(TK_BASS,.98);
  synth.setChorusMix(TK_BASS,.16); synth.setDelayMix(TK_BASS,.15);
  synth.setTrackFaderVolume(TK_BASS,.38); synth.setTrackPan(TK_BASS,-.08);

  /* TK_DRONE — bourdon sous-marin ultra grave */
  synth.loadInstrument('contrabass', TK_DRONE);
  synth.updateTrack(TK_DRONE,{
    bowNoise:false, unisonVoices:1, unisonDetune:4, unisonSpread:20,
    filterEnabled:true, filterType:'lowpass', filterCutoff:320, filterQ:0.50
  });
  synth.updateEnvelope(TK_DRONE,{attack:5.0, decay:1.2, sustain:.75, release:8.0});
  synth.loadFxPreset(TK_DRONE,'space');
  synth.setReverbMix(TK_DRONE,.95); synth.setReverbDecay(TK_DRONE,.99);
  synth.setTrackFaderVolume(TK_DRONE,.28); synth.setTrackPan(TK_DRONE,-.15);

  /* TK_VPAD — nappe spectrale — chant de baleine */
  synth.loadInstrument('violinNatural', TK_VPAD);
  synth.updateTrack(TK_VPAD,{
    unisonVoices:2, unisonDetune:7, unisonSpread:42,
    filterEnabled:true, filterType:'lowpass', filterCutoff:1400, filterQ:0.38
  });
  synth.updateEnvelope(TK_VPAD,{attack:4.0, decay:2.0, sustain:.50, release:7.0});
  synth.loadFxPreset(TK_VPAD,'space');
  synth.setReverbMix(TK_VPAD,.92); synth.setReverbDecay(TK_VPAD,.98);
  synth.setChorusMix(TK_VPAD,.28); synth.setDelayMix(TK_VPAD,.22);
  synth.setTrackFaderVolume(TK_VPAD,.16); synth.setTrackPan(TK_VPAD,.22);

  [TK_PIANO,TK_BASS,TK_DRONE,TK_VPAD].forEach(tk=>{
    synth.setTrackCompressorEnabled(tk,true);
    synth.setTrackCompressorThreshold(tk,-16);
    synth.setTrackCompressorRatio(tk,6);
    synth.setTrackCompressorAttack(tk,0.002);
    synth.setTrackCompressorRelease(tk,0.18);

/* ── Polyphony guard ──────────────────────────────────────── */
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const MAX_POLY = isSafari ? 6 : 10;
let allIds=[];
function killNote(id){
  try{
    const nd=synth.activeNotes&&synth.activeNotes.get(id);
    if(nd){
      const now=synth.audioContext.currentTime;
      if(nd.gainNode){nd.gainNode.gain.cancelScheduledValues(now);nd.gainNode.gain.setValueAtTime(nd.gainNode.gain.value,now);nd.gainNode.gain.linearRampToValueAtTime(0,now+0.05);}
      const t=now+0.06;
      if(nd.oscillators)nd.oscillators.forEach(v=>{try{v.stop(t);}catch(e){}});
      if(nd.lfo)try{nd.lfo.stop(t);}catch(e){}
    }
  }catch(e){}
  try{synth.stopNote(id);}catch(e){}
}
function track(id){allIds.push(id); while(allIds.length>MAX_POLY) killNote(allIds.shift());}

let pianoBuf=[], bassBuf=[], chordBuf=[], vpadBuf=[], droneNote=null;

function pluckString(deg, vel=0.6){
  if(!audioReady) return;
  deg = Math.max(0, Math.min(SCALE.length-1, deg|0));
  const nn   = SCALE[deg];
  const bass = [nn[0], Math.max(1, nn[1]-1)];

  const pid = synth.playNoteByName(nn[0], nn[1], TK_PIANO, 2.5);
  pianoBuf.push(pid); track(pid);
  while(pianoBuf.length > 2) killNote(pianoBuf.shift());

  const bid = synth.playNoteByName(bass[0], Math.max(2,bass[1]), TK_BASS, 3.0);
  bassBuf.push(bid); track(bid);
  while(bassBuf.length > 2) killNote(bassBuf.shift());
}

let _chordTimers = [];

function playChord(ci){
  if(!audioReady) return;
  const c = CHORDS[ci % CHORDS.length];

  _chordTimers.forEach(clearTimeout);
  _chordTimers = [];
  _lastChordMs = performance.now();
  _recenter = 1.0;

  while(chordBuf.length) killNote(chordBuf.shift());

  _exciteX = (ci / (CHORDS.length - 1)) * 14 - 7;

  cxU.value   = _exciteX;
  cAmpU.value = 1.0;
  _chordTimers.push(setTimeout(()=>{ cAmpU.value = 0.3; }, 250));
  _chordTimers.push(setTimeout(()=>{ cAmpU.value = 0;   }, 600));

  spawnRings(_exciteX);
  triggerBurst(_exciteX);
  startFlight(ci, _exciteX);

  synth.setTrackPan(TK_PIANO, c.pan);
  synth.setTrackPan(TK_BASS,  -c.pan * 0.6);
  c.notes.forEach((n,i)=>{
    _chordTimers.push(setTimeout(()=>{
      const bassN = [n[0], Math.max(2, n[1]-1)];
      const pid = synth.playNoteByName(n[0], n[1], TK_PIANO, 2.8);
      const bid = synth.playNoteByName(bassN[0], bassN[1], TK_BASS, 3.2);
      chordBuf.push(pid, bid); track(pid); track(bid);
      while(chordBuf.length > 8) killNote(chordBuf.shift());
    }, i * 120));   // arpège plus lent — sous-marin
  });
}

let droneStep=0;
function droneLoop(){
  if(!audioReady) return;
  if(droneNote){killNote(droneNote); droneNote=null;}
  const ns=[['C',1],['G',1],['E',1],['D',1],['A',1]];
  const n=ns[droneStep++%ns.length];
  droneNote=synth.playNoteByName(n[0],n[1],TK_DRONE,18);
  track(droneNote);
  setTimeout(droneLoop, 16000);
}

let vStep=0;
function violinLoop(){
  if(!audioReady) return;
  while(vpadBuf.length>2) killNote(vpadBuf.shift());
  const ps=[[['C',4],['G',4]],[['E',4],['B',4]],[['D',4],['A',4]],[['G',3],['D',4]]];
  ps[vStep++%ps.length].forEach((n,i)=>setTimeout(()=>{
    const id=synth.playNoteByName(n[0],n[1],TK_VPAD,14);
    vpadBuf.push(id); track(id);
  },i*300));
  setTimeout(violinLoop, 12000);
}

let windX=-12, windActive=false;
function triggerWind(){
  windX=-12; wAmpU.value=0.40; wxU.value=windX; windActive=true;
}
function scheduleWind(){
  triggerWind();
  setTimeout(scheduleWind, 6000+Math.random()*8000);
}

/* ═══════════════════════════════════════════════════════════════
   RAYCAST
   ═══════════════════════════════════════════════════════════════ */
const _ray   = new THREE.Raycaster();
const _plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
const _hit   = new THREE.Vector3();

function s2w(cx, cy, planeY=1.5){
  _plane.constant = -planeY;
  _ray.setFromCamera(
    new THREE.Vector2((cx/innerWidth)*2-1, -(cy/innerHeight)*2+1),
    camera
  );
  return _ray.ray.intersectPlane(_plane, _hit) ? _hit.clone() : null;
}

function xToDeg(wx){
  const t = (wx + 8) / 16;
  return Math.max(0, Math.min(SCALE.length-1, Math.floor(t*(SCALE.length-1))));
}

   CHORD KEYS UI

const CHORD_NAMES   = CHORD_CONFIG.map(c => c.name);
const KEY_LABELS_QW = CHORD_CONFIG.map(c => c.key);
const KEY_LABELS_AZ = KEY_LABELS_QW.map(k => k==='Q'?'A': k==='A'?'Q': k);
let detectedAzerty = true; /* AZERTY par défaut */
const keysEl = document.getElementById('keys');
const PER_ROW_UI = 6;

function buildKeysUI(){
  keysEl.innerHTML='';
  const labels = detectedAzerty ? KEY_LABELS_AZ : KEY_LABELS_QW;
  [0,1].forEach(row=>{
    const rowEl = document.createElement('div');
    rowEl.className='keys-row';
    for(let c=0;c<PER_ROW_UI;c++){
      const i = row*PER_ROW_UI + c;
      const k = document.createElement('div');
      k.className='key'; k.dataset.idx=i;
      k.innerHTML=`<span class="key-letter">${labels[i]}</span><span class="key-chord">${CHORD_NAMES[i]}</span>`;
      rowEl.appendChild(k);
    }
    keysEl.appendChild(rowEl);
  });
}
buildKeysUI();

keysEl.addEventListener('pointerdown', e=>{
  const el = e.target.closest('.key');
  if(!el) return;
  if(!experienceStarted) return;
  if(!audioReady){ initAudio(); return; }
  const idx = +el.dataset.idx;
  const now = performance.now();
  if(now - lastChordT < 380) return;
  lastChordT = now;
  playChord(idx);
  flashKey(idx);
  e.stopPropagation();
});

function flashKey(idx){
  const rowIdx = Math.floor(idx / PER_ROW_UI);
  const colIdx = idx % PER_ROW_UI;
  const rowEl = keysEl.children[rowIdx];
  if(!rowEl) return;
  const el = rowEl.children[colIdx];
  if(!el) return;
  el.classList.add('active');
  setTimeout(()=>el.classList.remove('active'), 420);
}

   INPUT

let ptDownX=0, ptDownY=0, lastNoteT=0, lastDeg=-1, lastChordT=0;

window.addEventListener('pointerdown', e=>{
  if(!experienceStarted) return;
  if(!WAVE_CONFIG.mouseEnabled) return;
  ptDownX=e.clientX; ptDownY=e.clientY;
  const w=s2w(e.clientX, e.clientY, 1.5);
  if(w){ mxU.value=w.x; myU.value=1.5; mzU.value=w.z; mAmpU.value=1.6; }
  if(!audioReady){ initAudio(); return; }
});

window.addEventListener('pointerup', e=>{
  if(!WAVE_CONFIG.mouseEnabled){ mAmpU.value=0; return; }
  const dx=e.clientX-ptDownX, dy=e.clientY-ptDownY;
  mAmpU.value=0.16;
  if(!audioReady) return;
  if(Math.sqrt(dx*dx+dy*dy) < 12){
    const now=performance.now();
    if(now-lastChordT < 380) return;
    lastChordT=now;
    const w=s2w(e.clientX, e.clientY, 1.5);
    if(w){
      const angle=(Math.atan2(w.z, w.x)+Math.PI)/(Math.PI*2);
      playChord(Math.floor(angle*CHORDS.length) % CHORDS.length);
    }
  }
});

window.addEventListener('pointermove', e=>{
  if(!experienceStarted) return;
  if(!WAVE_CONFIG.mouseEnabled) return;
  const w=s2w(e.clientX, e.clientY, 1.5);
  if(w){ mxU.value=w.x; myU.value=1.5; mzU.value=w.z; mAmpU.value=0.16; }
  if(!audioReady||!w) return;
  const now=performance.now();
  if(now-lastNoteT < 155) return;
  const deg = xToDeg(w.x);
  if(deg===lastDeg && now-lastNoteT < 340) return;
  lastNoteT=now; lastDeg=deg;
  pluckString(deg, 0.4);
});

window.addEventListener('pointerleave', ()=>{ mAmpU.value=0; });

/* Keyboard QWERTY/AZERTY */
const _held={};
addEventListener('keyup',  e=>delete _held[e.code]);
addEventListener('keydown', e=>{
  if(e.repeat||_held[e.code]) return;
  if(!experienceStarted) return;
  if(!audioReady){ initAudio(); return; }
  _held[e.code]=true;
  const k=e.key.toLowerCase();
  if(e.code==='KeyQ'){ const az=(k==='a'); if(az!==detectedAzerty){ detectedAzerty=az; buildKeysUI(); } }
  const map={
    KeyQ:0, KeyW:1, KeyE:2, KeyR:3, KeyT:4, KeyY:5,
    KeyA:6, KeyS:7, KeyD:8, KeyF:9, KeyG:10,KeyH:11
  };
  let idx=map[e.code]??-1;
  if(idx===-1&&k>='1'&&k<='9') idx=+k-1;
  if(idx>=0){
    const now=performance.now();
    if(now-lastChordT<380) return;
    lastChordT=now;
    playChord(idx);
    flashKey(idx);
    const wx=-8+idx*(16/5);
    mxU.value=wx; myU.value=1.5; mAmpU.value=1.5;
    setTimeout(()=>{ mAmpU.value=0.16; }, 120);
    e.preventDefault();
  }
});

/* ═══════════════════════════════════════════════════════════════
   ANIMATE
   ═══════════════════════════════════════════════════════════════ */
let lastT=performance.now();
const WIND_SPD = 4.0; // courant plus lent

async function animate(){
  const now=performance.now();
  const dt=Math.min((now-lastT)/1000, 0.05);
  lastT=now;
  dtU.value=dt;

  if(windActive){
    windX += dt*WIND_SPD;
    wxU.value = windX;
    if(windX > 12){ windActive=false; wAmpU.value=0; }
  }

  /* ════════ CAMÉRA ════════ */
  _exciteXSmooth += (_exciteX - _exciteXSmooth) * Math.min(dt * 1.5, 0.08);

  /* ── Flottement aquatique permanent ── */
  const fx    = floatVal(_floatOsc.px, now) * FLOAT_CFG.posAmpX;
  const fy    = floatVal(_floatOsc.py, now) * FLOAT_CFG.posAmpY;
  const fz    = floatVal(_floatOsc.pz, now) * FLOAT_CFG.posAmpZ;
  const roll  = floatVal(_floatOsc.rz, now) * FLOAT_CFG.rollAmp;
  const pitch = floatVal(_floatOsc.rx, now) * FLOAT_CFG.pitchAmp;

  if(_flightActive){
    const glideLerp = 1 - Math.pow(1 - FLIGHT_LERP, dt * 60);
    _homePos.lerp(_flightDest, glideLerp);
    _homeLook.lerp(_flightLookCenter, glideLerp);

    if(_homePos.distanceTo(_flightDest) < FLIGHT_ARRIVE_DIST){
      _flightActive = false;
    }

  } else {
    const silenceMs = now - _lastChordMs;
    if(silenceMs > DRIFT_CFG.idleDelay){
      const homeDrift = 1 - Math.pow(0.999, dt * 60);
      _homePos.lerp(CAM_BASE, homeDrift);
      _homeLook.lerp(CAM_LOOK_BASE, homeDrift);
    }
  }

  _camTarget.set(
    _homePos.x + _exciteXSmooth * WAVE_CONFIG.camExciteH + fx,
    _homePos.y + fy,
    _homePos.z + fz
  );
  _lookTarget.set(
    _homeLook.x + _exciteXSmooth * WAVE_CONFIG.lookExciteH + fx * 0.5,
    _homeLook.y + fy * 0.3,
    _homeLook.z + fz * 0.2
  );

  const LERP = 1 - Math.pow(1 - WAVE_CONFIG.camLerp, dt * 60);
  _camCurrent.lerp(_camTarget, LERP);
  _lookCurrent.lerp(_lookTarget, LERP);
  camera.position.copy(_camCurrent);
  camera.lookAt(_lookCurrent);

  camera.rotateZ(roll  * 0.15);
  camera.rotateX(pitch * 0.1);

  /* Particules sous-marines — parallaxe par profondeur + dérive ascendante */
  _starLayers.forEach(layer => {
    /* Parallaxe : les strates proches se décalent plus quand la caméra tourne */
    const parallaxScale = 1.0 / (1.0 + layer.avgDepth * 0.05);
    layer.pts.position.x = -_camCurrent.x * parallaxScale * 0.3;
    layer.pts.position.y = -_camCurrent.y * parallaxScale * 0.2;
    /* Dérive ascendante lente — particules montent dans l'eau */
    const posArr = layer.geo.attributes.position.array;
    const n = posArr.length / 3;
    for(let i = 0; i < n; i++){
      posArr[i*3+1] += dt * (0.02 + parallaxScale * 0.04); // monte
      posArr[i*3]   += Math.sin(now * 0.0005 + i * 1.7) * dt * 0.01; // léger courant
      /* Rebouclage vertical */
      const spread = PARTICLE_LAYERS[layer.cfgIdx]?.spread || 10;
      if(posArr[i*3+1] > spread * 0.75) posArr[i*3+1] = -spread * 0.75;
    }
    layer.geo.attributes.position.needsUpdate = true;
  });

  /* Anneaux — ondes de pression */
  for(let i = _rings.length-1; i >= 0; i--){
    const r = _rings[i];
    r.t += dt;
    const age = Math.max(0, r.t - r.delay);
    const s = 1 + age * r.speed * 6;
    r.mesh.scale.setScalar(s);
    r.mesh.material.opacity = Math.max(0, 0.6 - age * 1.2);
    if(r.mesh.material.opacity <= 0){
      scene.remove(r.mesh);
      r.mesh.geometry.dispose();
      r.mesh.material.dispose();
      _rings.splice(i, 1);
    }
  }

  /* Burst bioluminescent */
  let burstDirty = false;
  let burstMinT = 1.0;
  for(let i = 0; i < BURST_COUNT; i++){
    if(_burstAge[i] < 0) continue;
    _burstAge[i] += dt;
    const t = _burstAge[i] / _burstLife[i];
    if(t >= 1){
      _burstPos[i*3+1] = -9999;
      _burstAge[i] = -1;
    } else {
      _burstPos[i*3]   += _burstVel[i*3]   * dt;
      _burstPos[i*3+1] += _burstVel[i*3+1] * dt * (1 - t*0.5);
      _burstPos[i*3+2] += _burstVel[i*3+2] * dt;
      _burstPos[i*3]   += Math.sin(now * 0.002 + i) * dt * 0.3;
      if(t < burstMinT) burstMinT = t;
    }
    burstDirty = true;
  }
  if(burstDirty){
    /* Opacité basée sur la particule la plus jeune (la plus brillante) */
    _burstMat.opacity = 0.80 * (1 - burstMinT * 0.6);
    _burstPosAttr.needsUpdate = true;
  }

  /* ═══ MÉDUSES — pulsation et nage ═══ */
  for(const jf of _jellies){
    const pt = now * 0.001;
    /* Pulsation de la cloche */
    const pulse = Math.sin(pt * jf.pulseSpeed + jf.pulsePhase);
    const scaleXZ = 1.0 + pulse * 0.12;
    const scaleY  = 1.0 - pulse * 0.08;
    jf.bell.scale.set(scaleXZ, scaleY, scaleXZ);
    /* Opacité pulse — plus lumineuse à la contraction */
    jf.bellMat.opacity = 0.28 + (1 - pulse) * 0.15;
    jf.rimMat.opacity  = 0.55 + (1 - pulse) * 0.30;
    jf.coreMat.opacity = 0.60 + (1 - pulse) * 0.30;
    /* Dérive lente */
    jf.group.position.x += jf.driftX * dt;
    jf.group.position.y += jf.driftY * dt * (0.8 + pulse * 0.4);
    jf.group.position.z += jf.driftZ * dt;
    /* Oscillation latérale — nage de méduse */
    jf.group.position.x += Math.sin(pt * jf.wobbleFreq) * jf.wobbleAmp * dt;
    jf.group.rotation.z = Math.sin(pt * jf.wobbleFreq * 0.7) * 0.06;
    jf.group.rotation.x = Math.sin(pt * jf.wobbleFreq * 0.5) * 0.04;
    /* Rebouclage — reste autour du vortex */
    if(jf.group.position.y > SURFACE_Y - 4) jf.group.position.y = -3;
    if(jf.group.position.y < -5) jf.group.position.y = SURFACE_Y - 8;
    const distFromCenter = Math.sqrt(jf.group.position.x**2 + (jf.group.position.z+6)**2);
    if(distFromCenter > 18){
      const ang = Math.atan2(jf.group.position.z+6, jf.group.position.x);
      jf.group.position.x = Math.cos(ang) * 6;
      jf.group.position.z = -6 + Math.sin(ang) * 6;
    }
    /* Tentacules — ondulation */
    for(const tn of jf.tentacles){
      const posArr = tn.geo.attributes.position.array;
      for(let s = 1; s <= tn.segs; s++){
        const sf = s / tn.segs;
        const wave = Math.sin(pt * 1.5 + sf * 4 + tn.ang) * sf * jf.bellSize * 0.5;
        const wave2 = Math.cos(pt * 1.1 + sf * 3 + tn.ang * 2) * sf * jf.bellSize * 0.3;
        posArr[s*3]   = wave;
        posArr[s*3+1] = -s * (tn.tentLen / tn.segs);
        posArr[s*3+2] = wave2;
      }
      tn.geo.attributes.position.needsUpdate = true;
    }
  }

  /* Tentacules en forêt fixe — le mouvement vient du compute shader (GPU waves) */

  /* ═══ GOD RAYS SVG — oscillation douce des faisceaux ═══ */
  for(const r of _svgRays){
    const shiftX = Math.sin(now * r.freqX + r.phase) * r.ampX;
    const op = r.baseOpacity * (0.6 + 0.4 * Math.sin(now * r.freq + r.phase));
    const cx = r.cx + shiftX;
    const pts = [
      `${cx - r.topW/2},0`,
      `${cx + r.topW/2},0`,
      `${cx + r.drift + r.botW/2},${r.h}`,
      `${cx + r.drift - r.botW/2},${r.h}`
    ].join(' ');
    r.el.setAttribute('points', pts);
    r.el.style.opacity = op;
  }

  /* ═══ CAUSTICS — scintillement du fond marin ═══ */
  if(window._caustics){
    const { posAttr, n } = window._caustics;
    const arr = posAttr.array;
    for(let i = 0; i < n; i++){
      /* Micro-oscillation aléatoire — simulation de caustiques lumineuses */
      arr[i*3]   += Math.sin(now * 0.0018 + i * 2.71) * dt * 0.12;
      arr[i*3+2] += Math.cos(now * 0.0014 + i * 1.61) * dt * 0.06;
    }
    posAttr.needsUpdate = true;
    /* Opacité pulsante — lumière qui danse */
    window._caustics.mat.opacity = 0.40 + 0.25 * Math.sin(now * 0.0008);
  }

  /* ═══ LUMIÈRES ANIMÉES — surface + bioluminescence ═══ */
  surfaceLight.intensity = 3.5 + 0.5 * Math.sin(now * 0.0007);
  surfaceLight.position.x = Math.sin(now * 0.0003) * 8;
  bioLight.intensity = 0.5 + 0.3 * Math.sin(now * 0.0013 + 1.2);
  bioLight.position.x = Math.sin(now * 0.0009) * 4;
  bioLight.position.z = -5 + Math.cos(now * 0.0007) * 3;

  /* ═══ BULLES — remontent avec oscillation latérale ═══ */
  for(const b of _bubbles){
    b.mesh.position.y += b.speed * dt;
    b.mesh.position.x = b.baseX + Math.sin(now * 0.001 * b.wobbleFreq + b.phase) * b.wobbleAmp;
    b.mesh.position.z = b.baseZ + Math.cos(now * 0.0008 * b.wobbleFreq + b.phase) * b.wobbleAmp * 0.6;
    /* Recyclage : quand la bulle atteint la surface, respawn en bas */
    if(b.mesh.position.y > SURFACE_Y){
      b.mesh.position.y = -5 - Math.random() * 5;
      b.baseX = (Math.random() - 0.5) * 40;
      b.baseZ = -6 + (Math.random() - 0.5) * 30;
      b.mesh.position.x = b.baseX;
      b.mesh.position.z = b.baseZ;
    }
  }

  /* ── water ondulation — anime le filtre SVG sur tout l'écran ── */
  const waterTurb = document.getElementById('water-turb');
  if(waterTurb){
    const bfX = 0.014 + Math.sin(now * 0.00025) * 0.005;
    const bfY = 0.009 + Math.cos(now * 0.00018) * 0.003;
    /* seed non modifié — changer seed régénère le bruit aléatoirement → scintillement */
    waterTurb.setAttribute('baseFrequency', `${bfX} ${bfY}`);
  }

  if(computeNode) await renderer.computeAsync(computeNode);
  pipe.render();
}
</script>
</body>
</html>
