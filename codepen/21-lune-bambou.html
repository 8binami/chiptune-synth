<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lune de Bambou — #cpc-strings</title>
<style>
/* ════════════════════════════════════════════════════
   LUNE DE BAMBOU  ·  reset + layout
   ════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#000408;
  overflow:hidden;
  cursor:none;
  font-family:'Georgia','Times New Roman',serif;
}
canvas{position:fixed;inset:0;width:100%;height:100%}
#cv-bg {z-index:1}
#cv-mid{z-index:2}
#cv-fg {z-index:3}

/* ── Start screen ──────────────────────────────────── */
#start{
  position:fixed;inset:0;z-index:10;
  background:rgba(0,3,12,0.92);
  backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  transition:opacity 1.0s ease;
}
#start.hide{opacity:0;pointer-events:none}
.si{text-align:center;color:#e8dfc8;max-width:560px;padding:20px}
.si-kanji{
  font-size:clamp(64px,12vw,120px);
  line-height:1;letter-spacing:.35em;
  color:#f0e8cc;opacity:.18;margin-bottom:2px;
}
.si-title{
  font-size:clamp(18px,3.2vw,32px);font-weight:300;
  letter-spacing:.32em;text-transform:uppercase;
  color:#f0e8cc;margin:10px 0 5px;
}
.si-hr{width:70px;height:1px;background:rgba(240,232,200,.32);margin:12px auto}
.si-sub{
  font-size:clamp(10px,1.5vw,13px);letter-spacing:.16em;
  opacity:.45;line-height:1.9;color:#ccc8b8;margin-bottom:32px;
}
.si-btn{
  background:transparent;
  border:1px solid rgba(240,232,200,.38);
  color:#e8dfc8;
  font-family:inherit;font-size:clamp(10px,1.4vw,13px);
  letter-spacing:.30em;text-transform:uppercase;
  padding:13px 38px;cursor:none;
  transition:all .35s;
}
.si-btn:hover{background:rgba(240,232,200,.07);border-color:rgba(240,232,200,.68);color:#fff}

/* ── Custom cursor ─────────────────────────────────── */
#cursor{
  position:fixed;width:20px;height:20px;
  border:1px solid rgba(240,232,200,.55);border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:100;
  transition:transform .08s ease,border-color .2s;
}
#cursor::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:3px;height:3px;
  background:rgba(240,232,200,.80);border-radius:50%;
}
#cursor.pressing{transform:translate(-50%,-50%) scale(.62);border-color:rgba(240,232,200,.9)}
#cursor.ready   {border-color:rgba(180,230,200,.80)}

/* ── Note label ────────────────────────────────────── */
#nlabel{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  color:rgba(240,232,200,0);font-size:10px;
  letter-spacing:.40em;text-transform:uppercase;
  z-index:20;pointer-events:none;
  transition:color .12s,opacity .5s;
}
#nlabel.show{color:rgba(240,232,200,.50)}

/* ── Chord pads (bottom keyboard) ──────────────────── */
#chord-pads{
  position:fixed;
  bottom:42px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;
  padding:18px 22px;
  background:rgba(0,6,16,.38);
  backdrop-filter:blur(14px);
  border:1px solid rgba(240,232,200,.12);
  border-radius:2px;
  z-index:15;
  opacity:0;pointer-events:none;
  transition:opacity 1.4s ease 0.4s,transform 1.4s ease 0.4s;
  transform:translateX(-50%) translateY(20px);
}
#chord-pads.show{
  opacity:1;pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.pad{
  position:relative;
  width:72px;height:78px;
  background:rgba(8,14,32,.42);
  border:1px solid rgba(240,232,200,.22);
  color:#e8dfc8;
  cursor:none;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  user-select:none;overflow:hidden;
  transition:transform .25s ease,background .35s,border-color .35s,box-shadow .35s;
}
.pad::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 60%,rgba(255,230,180,0),rgba(255,230,180,0) 70%);
  transition:background .5s ease;
  pointer-events:none;
}
.pad:hover{
  background:rgba(18,26,50,.55);
  border-color:rgba(240,232,200,.48);
}
.pad:hover::before{
  background:radial-gradient(circle at 50% 60%,rgba(255,230,180,.12),rgba(255,230,180,0) 70%);
}
.pad.active{
  background:rgba(255,240,200,.18);
  border-color:rgba(255,240,200,.72);
  transform:scale(.94);
  box-shadow:0 0 24px rgba(255,230,180,.35),inset 0 0 12px rgba(255,230,180,.20);
}
.pad-k{
  font-size:30px;line-height:1;font-weight:300;
  margin-bottom:6px;color:#f0e8cc;opacity:.92;
}
.pad-n{
  font-size:8px;letter-spacing:.22em;
  text-transform:uppercase;opacity:.42;
  font-weight:300;
}
.pad-key{
  position:absolute;top:5px;right:6px;
  font-size:8px;opacity:.30;
  font-family:monospace;
}
</style>
</head>
<body>

<canvas id="cv-bg"></canvas>
<canvas id="cv-mid"></canvas>
<canvas id="cv-fg"></canvas>

<div id="start">
  <div class="si">
    <div class="si-kanji">竹月</div>
    <div class="si-title">Lune de Bambou</div>
    <div class="si-hr"></div>
    <p class="si-sub">
      Déplacez la souris pour jouer l'erhu<br>
      Cliquez pour frapper le koto<br>
      Laissez-vous porter par la nuit
    </p>
    <button class="si-btn" id="btn-enter">Entrer · 入</button>
  </div>
</div>

<div id="chord-pads">
  <button class="pad" data-idx="0"><span class="pad-key">1</span><span class="pad-k">静</span><span class="pad-n">Sei</span></button>
  <button class="pad" data-idx="1"><span class="pad-key">2</span><span class="pad-k">夢</span><span class="pad-n">Yume</span></button>
  <button class="pad" data-idx="2"><span class="pad-key">3</span><span class="pad-k">花</span><span class="pad-n">Hana</span></button>
  <button class="pad" data-idx="3"><span class="pad-key">4</span><span class="pad-k">雪</span><span class="pad-n">Yuki</span></button>
  <button class="pad" data-idx="4"><span class="pad-key">5</span><span class="pad-k">月</span><span class="pad-n">Tsuki</span></button>
  <button class="pad" data-idx="5"><span class="pad-key">6</span><span class="pad-k">風</span><span class="pad-n">Kaze</span></button>
</div>

<div id="cursor"></div>
<div id="nlabel"></div>

<script src="../dist/3.1.0/chiptune-synth.min.js"></script>
<script>
'use strict';
/* ╔══════════════════════════════════════════════════════════════╗
   ║  LUNE DE BAMBOU — Cordes Asiatiques Wavetable               ║
   ║  ChiptuneSynth 3.1.0  ·  Hirajoshi Pentatonic               ║
   ║  3 tracks: erhu · koto · contrabasse                         ║
   ╚══════════════════════════════════════════════════════════════╝ */

var synth    = new ChiptuneSynth();
var audioReady = false, audioInitPending = false;

var TK_ERHU  = 0;   // violinNatural  → mélodie erhu
var TK_KOTO  = 1;   // violaReal      → accent koto plucked
var TK_DRONE = 2;   // contrabass     → drone temple profond

/* ── Hirajoshi pentatonic: A  B  C  E  F ─────────────────────── */
var SCALE = [
  ['A',3],['B',3],['C',4],['E',4],['F',4],
  ['A',4],['B',4],['C',5],['E',5],['F',5]
];
var DEG_COLOR = [
  '#ffd6a0','#ffb3cc','#d4b0ff','#aad4ff','#aaffdc',
  '#ffd6a0','#ffb3cc','#d4b0ff','#aad4ff','#aaffdc'
];
var DRONE_PROG = [
  ['A',2],['E',2],['A',2],['F',2],['E',2],['D',2]
];

/* ═══════════════════════════════════════════════════════════════
   AUDIO INIT
   ═══════════════════════════════════════════════════════════════ */
async function initAudio(){
  if(audioReady || audioInitPending) return;
  audioInitPending = true;
  await synth.init();
  synth.setMasterVolume(0.40);

  /* ── TK_ERHU : violinNatural — erhu lean & expressive ─────── */
  synth.loadInstrument('violinNatural', TK_ERHU);
  synth.updateTrack(TK_ERHU,{
    bowNoise:false, bowNoiseLevel:0,
    unisonVoices:2, unisonDetune:4, unisonSpread:28,
    filterEnabled:true, filterType:'lowpass', filterCutoff:3400, filterQ:0.48
  });
  synth.updateEnvelope(TK_ERHU,{ attack:.09, decay:.28, sustain:.80, release:1.4 });
  synth.updateVibrato(TK_ERHU, { rate:5.5,  depth:11 });
  synth.loadFxPreset(TK_ERHU,'space');
  synth.setReverbMix(TK_ERHU,     .68);
  synth.setReverbDecay(TK_ERHU,   .90);
  synth.setChorusRate(TK_ERHU,    .42);
  synth.setChorusDepth(TK_ERHU,   .26);
  synth.setChorusMix(TK_ERHU,     .18);
  synth.setDelayTime(TK_ERHU,     .50);
  synth.setDelayFeedback(TK_ERHU, .22);
  synth.setDelayMix(TK_ERHU,      .13);
  synth.setTrackFaderVolume(TK_ERHU, .72);
  synth.setTrackPan(TK_ERHU,  .12);

  /* ── TK_KOTO : violaReal — koto plucked wavetable ─────────── */
  synth.loadInstrument('violaReal', TK_KOTO);
  synth.updateTrack(TK_KOTO,{
    bowNoise:false, bowNoiseLevel:0,
    unisonVoices:2, unisonDetune:3, unisonSpread:20,
    filterEnabled:true, filterType:'lowpass', filterCutoff:3900, filterQ:0.50
  });
  synth.updateEnvelope(TK_KOTO,{ attack:.003, decay:.75, sustain:.0, release:1.8 });
  synth.updateVibrato(TK_KOTO, { rate:0, depth:0 });
  synth.loadFxPreset(TK_KOTO,'space');
  synth.setReverbMix(TK_KOTO,     .62);
  synth.setReverbDecay(TK_KOTO,   .84);
  synth.setDelayTime(TK_KOTO,     .38);
  synth.setDelayFeedback(TK_KOTO, .16);
  synth.setDelayMix(TK_KOTO,      .20);
  synth.setTrackFaderVolume(TK_KOTO, .38);
  synth.setTrackPan(TK_KOTO, -.30);

  /* ── TK_DRONE : contrabass — temple pedal profond ──────────── */
  synth.loadInstrument('contrabass', TK_DRONE);
  synth.updateTrack(TK_DRONE,{
    bowNoise:false, bowNoiseLevel:0,
    unisonVoices:2, unisonDetune:3, unisonSpread:26,
    filterEnabled:true, filterType:'lowpass', filterCutoff:720, filterQ:0.55
  });
  synth.updateEnvelope(TK_DRONE,{ attack:2.2, decay:.80, sustain:.82, release:4.0 });
  synth.updateVibrato(TK_DRONE, { rate:3.2, depth:4 });
  synth.loadFxPreset(TK_DRONE,'space');
  synth.setReverbMix(TK_DRONE,     .78);
  synth.setReverbDecay(TK_DRONE,   .94);
  synth.setChorusRate(TK_DRONE,    .22);
  synth.setChorusDepth(TK_DRONE,   .28);
  synth.setChorusMix(TK_DRONE,     .22);
  synth.setTrackFaderVolume(TK_DRONE, .46);
  synth.setTrackPan(TK_DRONE, -.12);

  audioReady       = true;
  audioInitPending = false;
  droneLoop();
}

/* ═══════════════════════════════════════════════════════════════
   NOTE TRACKING + PLAYBACK  (smooth crossfade pool)
   ═══════════════════════════════════════════════════════════════ */
var lastNoteTime=0, lastNoteIdx=-1, lastPlayPosIdx=-1;
var erhuPool=[], MAX_ERHU=3;      // pool de notes qui se crossfade naturellement
var currentKotoNotes=[], MAX_KOTO=4, lastKotoTime=0;
var moveAccum=0;
var mouseX=0, mouseY=0;

/* Smoothed filter/vibrato values (lerp-based pour fluidité) */
var smoothCutoff=2800, targetCutoff=2800;
var smoothVib=9, targetVib=9;

function playNote(degIdx, velocity, duration){
  if(!audioReady) return;
  var now = performance.now();
  /* throttle réduit : 130ms = ~7.5 notes/s max, plus fluide */
  if(now - lastNoteTime < 130) return;
  /* même degré récent : on ne retrigger pas (évite le stuttering) */
  if(degIdx === lastNoteIdx && now - lastNoteTime < 340) return;
  lastNoteTime = now;
  degIdx = Math.max(0, Math.min(SCALE.length-1, degIdx|0));
  var nn = SCALE[degIdx];
  lastNoteIdx = degIdx;

  /* targets smoothed — lerp dans l'update loop */
  targetCutoff = 1400 + velocity*2600;
  targetVib    = 5 + velocity*10;

  /* Nouvelle note rejoint le pool, les anciennes fade naturellement via leur release 1.4s */
  var noteId = synth.playNoteByName(nn[0], nn[1], TK_ERHU, duration||2.8);
  erhuPool.push(noteId);
  /* dépassement pool → stop la plus ancienne (release envelope gère le fade) */
  while(erhuPool.length > MAX_ERHU){
    try{synth.stopNote(erhuPool.shift())}catch(e){}
  }

  /* koto shimmer — sparse */
  if(now - lastKotoTime > 420 && Math.random() < .34){
    lastKotoTime = now;
    var kd  = Math.min(SCALE.length-1, degIdx + 2 + Math.floor(Math.random()*2));
    var kn  = SCALE[kd];
    var kId = synth.playNoteByName(kn[0], kn[1], TK_KOTO, 3.2);
    currentKotoNotes.push(kId);
    if(currentKotoNotes.length > MAX_KOTO){
      try{synth.stopNote(currentKotoNotes.shift())}catch(e){}
    }
  }

  /* visuals */
  spawnInkSplash(mouseX, mouseY, velocity);
  spawnRipple(mouseX, mouseY, velocity, DEG_COLOR[degIdx]);
  showNoteLabel(nn[0] + nn[1]);
}

/* ═══════════════════════════════════════════════════════════════
   CHORD PADS — accords Hirajoshi
   ═══════════════════════════════════════════════════════════════ */
var CHORD_PADS = [
  { kanji:'静', name:'SEI',   chord:[['A',3],['C',4],['E',4],['A',4]], color:'#ffd6a0' },
  { kanji:'夢', name:'YUME',  chord:[['B',3],['E',4],['F',4],['B',4]], color:'#ffb3cc' },
  { kanji:'花', name:'HANA',  chord:[['C',4],['E',4],['F',4],['C',5]], color:'#d4b0ff' },
  { kanji:'雪', name:'YUKI',  chord:[['E',4],['A',4],['B',4],['E',5]], color:'#aad4ff' },
  { kanji:'月', name:'TSUKI', chord:[['F',4],['A',4],['C',5],['F',5]], color:'#aaffdc' },
  { kanji:'風', name:'KAZE',  chord:[['A',4],['C',5],['E',5],['A',5]], color:'#ffecb3' }
];

var chordKotoPool = [];
function playChordPad(padIdx){
  if(!audioReady) return;
  var pad = CHORD_PADS[padIdx];
  if(!pad) return;

  /* Strum doux via koto — 70ms entre chaque note */
  pad.chord.forEach(function(n, i){
    setTimeout(function(){
      var id = synth.playNoteByName(n[0], n[1], TK_KOTO, 4.5);
      chordKotoPool.push(id);
      if(chordKotoPool.length > 14){
        try{synth.stopNote(chordKotoPool.shift())}catch(e){}
      }
    }, i*70);
  });

  /* Basse renforcée via erhu sur la fondamentale (sustained warm pad) */
  setTimeout(function(){
    var root = pad.chord[0];
    var rId = synth.playNoteByName(root[0], root[1], TK_ERHU, 5.0);
    erhuPool.push(rId);
    while(erhuPool.length > MAX_ERHU+1){
      try{synth.stopNote(erhuPool.shift())}catch(e){}
    }
  }, 20);

  /* Visual feedback */
  var el = document.querySelector('.pad[data-idx="'+padIdx+'"]');
  if(el){
    el.classList.add('active');
    setTimeout(function(){ el.classList.remove('active'); }, 320);
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width/2;
    var cy = rect.top  + rect.height/2;
    spawnRipple(cx, cy, 1.1, pad.color);
    spawnRipple(cx, cy, .85, pad.color);
    spawnRipple(cx, cy, .6,  'rgba(255,240,200,.35)');
    for(var k=0;k<12;k++){
      spawnInkSplash(cx+(Math.random()-.5)*40, cy+(Math.random()-.5)*40, .85);
    }
    /* burst de pétales depuis le pad */
    for(var p=0;p<10;p++){
      petals.push({
        x:cx+(Math.random()-.5)*50, y:cy+(Math.random()-.5)*20,
        vx:(Math.random()-.5)*3.2, vy:-1.5-Math.random()*1.5,
        r:2.5+Math.random()*2.8,
        angle:Math.random()*Math.PI*2,
        spin:(Math.random()-.5)*.08,
        wb:Math.random()*Math.PI*2, wbAmp:.4+Math.random()*.5, wbSpd:.02+Math.random()*.02,
        a:.7+Math.random()*.3,
        h:340+Math.random()*20, s:70+Math.random()*20, l:82+Math.random()*12
      });
    }
  }

  showNoteLabel(pad.kanji + ' · ' + pad.name);
}

function playKotoStrike(degIdx){
  if(!audioReady) return;
  [0,2,4].forEach(function(off, i){
    setTimeout(function(){
      var d  = Math.max(0, Math.min(SCALE.length-1, degIdx + off));
      var nn = SCALE[d];
      var kId= synth.playNoteByName(nn[0], nn[1], TK_KOTO, 3.0);
      currentKotoNotes.push(kId);
      if(currentKotoNotes.length > MAX_KOTO + 3){
        try{synth.stopNote(currentKotoNotes.shift())}catch(e){}
      }
    }, i*72);
  });
}

/* ── Drone cycle ──────────────────────────────────────────────── */
var droneStep=0, currentDroneNote=null;
function droneLoop(){
  if(!audioReady) return;
  if(currentDroneNote){ try{synth.stopNote(currentDroneNote)}catch(e){} currentDroneNote=null; }
  var n = DRONE_PROG[droneStep % DRONE_PROG.length];
  currentDroneNote = synth.playNoteByName(n[0], n[1], TK_DRONE, 12);
  droneStep++;
  setTimeout(droneLoop, 11000);
}

/* ── Idle melody (erhu auto-phrases) ─────────────────────────── */
var lastMoveTime=performance.now(), idleMelodyTimer=null;
function scheduleIdleMelody(){
  if(idleMelodyTimer) clearTimeout(idleMelodyTimer);
  idleMelodyTimer = setTimeout(function tick(){
    var now = performance.now();
    if(now - lastMoveTime > 950 && audioReady){
      var base   = Math.max(0, Math.min(SCALE.length-1, lastNoteIdx>=0 ? lastNoteIdx : Math.floor(SCALE.length/2)));
      var offset = [-3,-2,-1,0,1,2,3][Math.floor(Math.random()*7)];
      var deg    = Math.max(0, Math.min(SCALE.length-1, base + offset));
      playNote(deg, .30 + Math.random()*.28, 3.2);
    }
    idleMelodyTimer = setTimeout(tick, 820 + Math.random()*580);
  }, 1400);
}

/* ── Note label HUD ───────────────────────────────────────────── */
var nlabel = document.getElementById('nlabel');
function showNoteLabel(txt){
  nlabel.textContent = txt;
  nlabel.classList.add('show');
  clearTimeout(nlabel._t);
  nlabel._t = setTimeout(function(){ nlabel.classList.remove('show'); }, 900);
}

/* ═══════════════════════════════════════════════════════════════
   CANVAS SETUP
   ═══════════════════════════════════════════════════════════════ */
var cvBg  = document.getElementById('cv-bg');
var cvMid = document.getElementById('cv-mid');
var cvFg  = document.getElementById('cv-fg');
var ctxBg  = cvBg.getContext('2d');
var ctxMid = cvMid.getContext('2d');
var ctxFg  = cvFg.getContext('2d');
var W=0, H=0, DPR=1, t=0;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  [cvBg,cvMid,cvFg].forEach(function(c){
    c.width  = W*DPR; c.height = H*DPR;
    c.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  paintStaticBg();
  initBamboos();
  initMists();
  initPetals();
}
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════════════════════
   STATIC BACKGROUND  (painted once)
   ═══════════════════════════════════════════════════════════════ */
function paintStaticBg(){
  /* sky gradient */
  var g = ctxBg.createLinearGradient(0,0,0,H);
  g.addColorStop(0,   '#00080f');
  g.addColorStop(.38, '#010d1e');
  g.addColorStop(.74, '#020b17');
  g.addColorStop(1,   '#000408');
  ctxBg.fillStyle = g;
  ctxBg.fillRect(0,0,W,H);
  paintStars();
  paintMoon();
  paintMountains();
}

function paintStars(){
  var s=42;
  function r(){ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }
  for(var i=0;i<220;i++){
    var sx=r()*W, sy=r()*H*.70;
    ctxBg.fillStyle = 'rgba(210,225,255,'+(r()*.55+.08)+')';
    ctxBg.beginPath();
    ctxBg.arc(sx, sy, r()*1.1+.2, 0, Math.PI*2);
    ctxBg.fill();
  }
}

function paintMoon(){
  var mx=W*.80, my=H*.11, mr=Math.min(W,H)*.068;
  /* halos */
  [4,3,2,1].forEach(function(i){
    var hg=ctxBg.createRadialGradient(mx,my,mr*.5,mx,my,mr*(1+i*.9));
    hg.addColorStop(0,'rgba(255,252,218,'+(0.058/i)+')');
    hg.addColorStop(1,'rgba(255,252,200,0)');
    ctxBg.fillStyle=hg;
    ctxBg.beginPath(); ctxBg.arc(mx,my,mr*(1+i*.9),0,Math.PI*2); ctxBg.fill();
  });
  /* body */
  var mg=ctxBg.createRadialGradient(mx-mr*.22,my-mr*.22,0,mx,my,mr);
  mg.addColorStop(0,   'rgba(255,255,245,.95)');
  mg.addColorStop(.65, 'rgba(252,250,218,.92)');
  mg.addColorStop(1,   'rgba(240,238,200,.82)');
  ctxBg.fillStyle=mg;
  ctxBg.beginPath(); ctxBg.arc(mx,my,mr,0,Math.PI*2); ctxBg.fill();
}

function paintMountains(){
  var layers=[
    {yb:.58,amp:.22,pk:6,col:'rgba(5,15,35,.90)'},
    {yb:.66,amp:.15,pk:5,col:'rgba(3,10,26,.95)'},
    {yb:.72,amp:.09,pk:4,col:'rgba(2,7,18,.98)'}
  ];
  var sd=77;
  function rr(){ sd=(sd*1664525+1013904223)&0xffffffff; return (sd>>>0)/0xffffffff; }
  layers.forEach(function(l){
    var pts=[[0, H*(l.yb+l.amp*.4)]];
    var n=l.pk*2+2;
    for(var p=1;p<=n;p++){
      var px=(p/(n+1))*W;
      var py=p%2===1
        ? H*(l.yb - l.amp*(.5+rr()*.5))
        : H*(l.yb + l.amp*(.1+rr()*.3));
      pts.push([px,py]);
    }
    pts.push([W,H*(l.yb+l.amp*.4)],[W,H],[0,H]);
    ctxBg.fillStyle=l.col;
    ctxBg.beginPath();
    ctxBg.moveTo(pts[0][0],pts[0][1]);
    for(var i=1;i<pts.length-2;i++){
      var cx=(pts[i][0]+pts[i+1][0])/2, cy=(pts[i][1]+pts[i+1][1])/2;
      ctxBg.quadraticCurveTo(pts[i][0],pts[i][1],cx,cy);
    }
    ctxBg.lineTo(pts[pts.length-2][0],pts[pts.length-2][1]);
    ctxBg.lineTo(pts[pts.length-1][0],pts[pts.length-1][1]);
    ctxBg.closePath(); ctxBg.fill();
  });
}

/* ═══════════════════════════════════════════════════════════════
   BAMBOO
   ═══════════════════════════════════════════════════════════════ */
var bamboos=[];
function initBamboos(){
  bamboos=[];
  [.04,.10,.16,.82,.88,.94,.97].forEach(function(xN,i){
    bamboos.push({
      x: W*xN,
      totalH: H*(.52+(i%3)*.14),
      segments: 7+(i%3),
      baseW: 6+(i%3)*3,
      phase: i*1.1,
      speed: .38+(i%3)*.14,
      flip: xN>.5 ? -1 : 1
    });
  });
}

function drawBamboos(ctx){
  bamboos.forEach(function(b){
    var sway = Math.sin(t*.00040*b.speed + b.phase)*9;
    ctx.save(); ctx.translate(b.x, H);
    var segH = b.totalH / b.segments;
    for(var s=0;s<b.segments;s++){
      var sw  = b.baseW * Math.max(.25, 1 - s/(b.segments*1.5));
      var ey  = -(s+1)*segH;
      var sy  = -s*segH;
      var sf  = s/b.segments;
      var ox  = sway * sf * sf;
      /* stalk */
      var gr  = ctx.createLinearGradient(ox-sw,sy,ox+sw,sy);
      gr.addColorStop(0,   'rgba(8,38,8,.92)');
      gr.addColorStop(.35, 'rgba(22,72,16,.96)');
      gr.addColorStop(.65, 'rgba(38,100,24,.92)');
      gr.addColorStop(1,   'rgba(12,50,8,.88)');
      ctx.fillStyle=gr;
      ctx.fillRect(ox-sw/2, ey, sw, segH-1.5);
      /* node */
      ctx.strokeStyle='rgba(4,22,4,.9)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(ox-sw/2-1,sy-1); ctx.lineTo(ox+sw/2+1,sy-1); ctx.stroke();
      /* leaves every other segment */
      if(s>0 && s%2===1){
        var ld = b.flip * (s%4<2 ? 1 : -1);
        drawLeaf(ctx, ox, sy-segH*.22, ld, sw, sway*sf*.4);
      }
    }
    ctx.restore();
  });
}

function drawLeaf(ctx, x, y, dir, bw, sway){
  var len=28+bw*2;
  ctx.save(); ctx.translate(x,y);
  ctx.rotate(dir*(.55+sway*.015)+(dir>0?-.10:.10));
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(dir*len*.55,-7, dir*len,0);
  ctx.quadraticCurveTo(dir*len*.55, 7, 0,0);
  ctx.fillStyle='rgba(24,72,16,.62)'; ctx.fill();
  ctx.strokeStyle='rgba(35,90,20,.30)'; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*len*.82,0); ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   CHERRY BLOSSOM PETALS
   ═══════════════════════════════════════════════════════════════ */
var petals=[];
function initPetals(){
  petals=[];
  for(var i=0;i<72;i++) petals.push(mkPetal(true));
}
function mkPetal(scatter){
  return{
    x:Math.random()*W,
    y:scatter ? Math.random()*H : -14-Math.random()*H*.15,
    vx:(Math.random()-.5)*.5,
    vy:.32+Math.random()*.60,
    r:2.5+Math.random()*2.8,
    angle:Math.random()*Math.PI*2,
    spin:(Math.random()-.5)*.033,
    wb:Math.random()*Math.PI*2,
    wbAmp:.30+Math.random()*.50,
    wbSpd:.017+Math.random()*.016,
    a:.40+Math.random()*.45,
    h:340+Math.random()*18,
    s:62+Math.random()*22,
    l:80+Math.random()*14
  };
}
function updatePetals(){
  var wind=Math.sin(t*.0005)*.38;
  for(var i=petals.length-1;i>=0;i--){
    var p=petals[i];
    p.wb+=p.wbSpd; p.x+=p.vx+wind+Math.sin(p.wb)*p.wbAmp;
    p.y+=p.vy; p.angle+=p.spin;
    if(p.y>H+22||p.x<-32||p.x>W+32) petals.splice(i,1);
  }
  while(petals.length<100) petals.push(mkPetal(false));
}
function drawPetals(ctx){
  petals.forEach(function(p){
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
    ctx.globalAlpha=p.a*.72;
    ctx.fillStyle='hsl('+p.h+','+p.s+'%,'+p.l+'%)';
    ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*.52,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.ellipse(-p.r*.18,-p.r*.14,p.r*.30,p.r*.16,-.45,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════════
   RIPPLES
   ═══════════════════════════════════════════════════════════════ */
var ripples=[];
function spawnRipple(x, y, vel, color){
  ripples.push({x,y,r:4,  maxR:105+vel*95,  life:1, lw:1.4, color:color||'rgba(200,215,255,.7)'});
  ripples.push({x,y,r:2,  maxR:165+vel*75,  life:1, lw:.65,  color:color||'rgba(200,215,255,.4)'});
}
function updateRipples(){
  for(var i=ripples.length-1;i>=0;i--){
    var r=ripples[i];
    r.r+=(r.maxR-r.r)*.045; r.life-=.009;
    if(r.life<=0) ripples.splice(i,1);
  }
}
function drawRipples(ctx){
  ripples.forEach(function(r){
    ctx.save(); ctx.globalAlpha=r.life*.58;
    ctx.strokeStyle=r.color; ctx.lineWidth=r.lw;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════════
   INK SPLASH PARTICLES
   ═══════════════════════════════════════════════════════════════ */
var inkParts=[];
function spawnInkSplash(x,y,vel){
  var n=2+Math.floor(vel*4);
  for(var i=0;i<n;i++){
    inkParts.push({
      x:x+(Math.random()-.5)*14, y:y+(Math.random()-.5)*14,
      vx:(Math.random()-.5)*.9,  vy:(Math.random()-.5)*.9-.38,
      r:1+Math.random()*2.2+vel*1.8,
      life:1, decay:.013+Math.random()*.010
    });
  }
  if(inkParts.length>320) inkParts.splice(0,inkParts.length-320);
}
function updateInk(){
  for(var i=inkParts.length-1;i>=0;i--){
    var p=inkParts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.016; p.life-=p.decay;
    if(p.life<=0) inkParts.splice(i,1);
  }
}
function drawInk(ctx){
  inkParts.forEach(function(p){
    ctx.save(); ctx.globalAlpha=p.life*.68;
    ctx.fillStyle='rgba(218,228,255,.82)';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════════
   MIST LAYERS
   ═══════════════════════════════════════════════════════════════ */
var mists=[];
function initMists(){
  mists=[];
  for(var i=0;i<5;i++){
    mists.push({
      x:Math.random()*W, y:H*(.33+Math.random()*.36),
      rx:155+Math.random()*235, ry:32+Math.random()*48,
      al:.022+Math.random()*.028,
      vx:(Math.random()-.5)*.11,
      ph:Math.random()*Math.PI*2
    });
  }
}
function updateMists(){
  mists.forEach(function(m){
    m.x+=m.vx; m.ph+=.0014; m.y+=Math.sin(m.ph)*.08;
    if(m.x>W+m.rx) m.x=-m.rx;
    if(m.x<-m.rx)  m.x=W+m.rx;
  });
}
function drawMists(ctx){
  mists.forEach(function(m){
    var g=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.rx);
    g.addColorStop(0,'rgba(188,210,240,'+(m.al*2)+')');
    g.addColorStop(.5,'rgba(188,210,240,'+m.al+')');
    g.addColorStop(1,'rgba(188,210,240,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(m.x,m.y,m.rx,m.ry,0,0,Math.PI*2); ctx.fill();
  });
}

/* ═══════════════════════════════════════════════════════════════
   WATER REFLECTION (bottom 24% of screen)
   ═══════════════════════════════════════════════════════════════ */
function drawWater(ctx){
  var wY=H*.76, wH=H-wY;
  var g=ctx.createLinearGradient(0,wY,0,H);
  g.addColorStop(0,'rgba(3,8,24,.80)');
  g.addColorStop(1,'rgba(0,3,12,.96)');
  ctx.fillStyle=g; ctx.fillRect(0,wY,W,wH);

  ctx.save(); ctx.beginPath(); ctx.rect(0,wY,W,wH); ctx.clip();
  /* shimmer lines */
  for(var rl=0;rl<9;rl++){
    var ly=wY+8+rl*(wH/9.5);
    var wv=Math.sin(t*.0009+rl*.8)*11;
    var al=.072-rl*.006; if(al<=0) continue;
    ctx.strokeStyle='rgba(200,220,255,'+al+')'; ctx.lineWidth=.7;
    ctx.beginPath();
    ctx.moveTo(W*.78-88+wv, ly);
    ctx.lineTo(W*.78+88-wv, ly);
    ctx.stroke();
  }
  /* moon reflection */
  var mxR=W*.80, myR=wY+H*.11*.18+14;
  var rg=ctx.createRadialGradient(mxR,myR,0,mxR,myR,70);
  rg.addColorStop(0,'rgba(255,255,218,.20)');
  rg.addColorStop(1,'rgba(255,255,218,0)');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.ellipse(mxR,myR,70,20,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* surface line */
  ctx.save(); ctx.globalAlpha=.10;
  ctx.strokeStyle='rgba(140,180,255,.55)'; ctx.lineWidth=.7;
  ctx.beginPath();
  for(var wx=0;wx<=W;wx+=4){
    var wy2=wY+Math.sin(wx*.018+t*.0007)*1.5;
    wx===0 ? ctx.moveTo(wx,wy2) : ctx.lineTo(wx,wy2);
  }
  ctx.stroke(); ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   VIGNETTE
   ═══════════════════════════════════════════════════════════════ */
function drawVignette(ctx){
  var g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.24,W/2,H/2,Math.max(W,H)*.82);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,2,8,.68)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════════════════════════ */
function render(){
  t++;

  /* ── Smooth filter/vibrato lerp (fluidité sonore) ─ */
  if(audioReady){
    var d1 = targetCutoff - smoothCutoff;
    var d2 = targetVib    - smoothVib;
    if(Math.abs(d1) > 1 || Math.abs(d2) > .05){
      smoothCutoff += d1 * .09;
      smoothVib    += d2 * .09;
      synth.updateTrack(TK_ERHU,  { filterCutoff: smoothCutoff });
      synth.updateVibrato(TK_ERHU,{ rate:5.5, depth: smoothVib });
    }
  }

  /* ── Mid canvas ─────────────────────────────────── */
  ctxMid.clearRect(0,0,W,H);
  drawWater(ctxMid);
  drawBamboos(ctxMid);
  updateRipples(); drawRipples(ctxMid);
  updateInk();     drawInk(ctxMid);
  updatePetals();  drawPetals(ctxMid);

  /* ── Fg canvas ──────────────────────────────────── */
  ctxFg.clearRect(0,0,W,H);
  updateMists();   drawMists(ctxFg);
  drawVignette(ctxFg);

  requestAnimationFrame(render);
}

/* ═══════════════════════════════════════════════════════════════
   INPUT HANDLERS
   ═══════════════════════════════════════════════════════════════ */
var cursorEl = document.getElementById('cursor');
var mouseDown = false;

window.addEventListener('pointermove', function(e){
  var x=e.clientX, y=e.clientY;
  cursorEl.style.left=x+'px'; cursorEl.style.top=y+'px';
  lastMoveTime = performance.now();
  var dx=x-mouseX, dy=y-mouseY; mouseX=x; mouseY=y;
  var d=Math.sqrt(dx*dx+dy*dy);

  /* Y → target filter/vib en continu (même sans retrigger) */
  if(audioReady){
    var yN  = 1-(y/H);
    var xN  = x/W;
    /* expression continue : mouse Y contrôle le filtre en permanence */
    var baseVel = .25 + yN*.45;
    targetCutoff = 1500 + baseVel*2700;
    targetVib    = 4 + baseVel*10;
  }

  if(!audioReady) return;
  moveAccum+=d;
  /* seuil plus bas = plus réactif, mais protection same-degree dans playNote */
  if(moveAccum>22){
    moveAccum=0;
    var deg=Math.max(0,Math.min(SCALE.length-1, Math.floor((x/W)*SCALE.length)));
    if(deg!==lastPlayPosIdx){
      var yN2=1-(y/H);
      var vel=Math.min(1, .26+d/55+yN2*.24);
      playNote(deg, vel, 3.0);
      lastPlayPosIdx=deg;
    }
    if(d>8) spawnInkSplash(x,y,Math.min(.55,d/42));
  }
});

/* ── Click on chord pads ──────────────────────────── */
document.querySelectorAll('.pad').forEach(function(el){
  el.addEventListener('pointerdown', function(e){
    e.stopPropagation();
    var idx = parseInt(el.getAttribute('data-idx'),10);
    if(!audioReady){
      initAudio().then(function(){
        document.getElementById('start').classList.add('hide');
        document.getElementById('chord-pads').classList.add('show');
        cursorEl.classList.add('ready');
        scheduleIdleMelody();
        setTimeout(function(){ playChordPad(idx); }, 300);
      });
      return;
    }
    playChordPad(idx);
  });
});

/* ── Global pointerdown (zone libre) ──────────────── */
window.addEventListener('pointerdown', function(e){
  /* ignore les clics sur les pads */
  if(e.target && e.target.closest && e.target.closest('.pad, #chord-pads, #start')) return;
  mouseDown=true; cursorEl.classList.add('pressing');
  if(!audioReady) return;
  var x=e.clientX, y=e.clientY; mouseX=x; mouseY=y;
  var deg=Math.max(0,Math.min(SCALE.length-1, Math.floor((x/W)*SCALE.length)));
  playKotoStrike(deg);
  spawnRipple(x,y,.90, DEG_COLOR[deg]);
  spawnRipple(x,y,.65,'rgba(255,240,195,.28)');
  spawnInkSplash(x,y,.88);
});

window.addEventListener('pointerup', function(){
  mouseDown=false; cursorEl.classList.remove('pressing');
});

/* ── Button Entrer + Enter key ────────────────────── */
function enterExperience(){
  initAudio().then(function(){
    document.getElementById('start').classList.add('hide');
    document.getElementById('chord-pads').classList.add('show');
    cursorEl.classList.add('ready');
    scheduleIdleMelody();
  });
}
document.getElementById('btn-enter').addEventListener('click', enterExperience);

/* ── Keyboard: Enter + 1-6 pour les chords ───────── */
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && !audioReady){ enterExperience(); return; }
  if(!audioReady) return;
  var k = e.key;
  if(k>='1' && k<='6'){
    var idx = parseInt(k,10) - 1;
    playChordPad(idx);
    e.preventDefault();
  }
});

/* ── Boot ─────────────────────────────────────────────────────── */
resize();
render();
</script>
